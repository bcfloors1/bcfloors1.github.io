<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { padding-bottom: 0 !important; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f4f8; color: #1a2530; }

.no-print {
  background: #006CB1; padding: 10px 14px;
  display: flex; gap: 10px; align-items: center; justify-content: center;
}
.no-print button {
  padding: 10px 24px; border: none; border-radius: 6px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-print { background: #e8a020; color: white; }
.btn-share { background: #2e6da4; color: white; }

.page {
  width: 210mm; margin: 8mm auto; background: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
@page { size: A4; margin: 0; }

/* HEADER */
.hdr {
  background: #006CB1; padding: 10px 16px 8px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 3px solid #e8a020;
}
.hdr img { height: 26px; }
.hdr-r { text-align: right; color: white; }
.hdr-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
.hdr-sub { font-size: 8px; opacity: 0.65; margin-top: 2px; }

/* PERUSTIEDOT */
.info-section {
  padding: 10px 14px 6px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px;
  border-bottom: 1px solid #dde4ec;
}
.info-field { display: flex; flex-direction: column; }
.info-field label {
  font-size: 7px; font-weight: 700; color: #006CB1;
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px;
}
.info-field input, .info-field select {
  border: none; border-bottom: 1px solid #c8d0d8;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11px; color: #1a2530;
  background: transparent; outline: none; padding: 1px 0;
}
.info-field select { cursor: pointer; }

/* TAULUKKO */
.table-wrap { padding: 10px 14px; }
table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
th {
  background: #006CB1; color: white; font-size: 8px;
  font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  padding: 5px 6px; text-align: left; border: 1px solid #0058a0;
}
th.num { text-align: right; }
td {
  padding: 4px 6px; border: 1px solid #c8d0d8;
  vertical-align: middle;
}
td input {
  width: 100%; border: none; background: transparent;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11px; color: #1a2530;
  outline: none; padding: 0;
}
td input[type=number] { text-align: right; }
td.calc { background: white; font-weight: 700; color: #006CB1; text-align: right; font-size: 11px; white-space: nowrap; }
td.yks-cell select {
  border: none; background: transparent;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11px; color: #1a2530;
  outline: none; width: 100%; cursor: pointer;
}
.add-row-btn {
  margin-top: 8px; padding: 6px 14px;
  background: #e8f4fc; border: 1px dashed #006CB1;
  color: #006CB1; font-size: 11px; font-weight: 700;
  cursor: pointer; border-radius: 4px; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.del-btn {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: 14px; padding: 0 2px;
  line-height: 1;
}
.del-btn:hover { color: #ef4444; }

/* Piilota number input nuolet */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }

/* YHTEENSÄ */
.total-row td {
  background: white;
  color: #1a2530;
  font-weight: 700;
  font-size: 11px;
  border-top: 2px solid #006CB1;
  white-space: nowrap;
}
.total-row td:last-child { color: #006CB1; font-size: 13px; }
.total-row.hidden { display: none; }
@media print {
  .total-row.has-sum { display: table-row !important; }
  .total-row td { border-top: 2px solid #006CB1 !important; }
}

/* ALLEKIRJOITUKSET */
.sigs {
  display: flex; gap: 12px;
  padding: 10px 14px 8px;
  border-top: 2px solid #dde4ec;
  margin-top: 4px;
}
.sig { flex: 1; }
.sig-title {
  font-size: 8px; font-weight: 700; color: #006CB1;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.sig-canvas {
  width: 100%; height: 90px; border: 1.5px dashed #c8d0d8;
  border-radius: 6px; background: #fafbfc; display: block;
  touch-action: none; cursor: crosshair;
}
.sig-canvas.has-sig { border-color: #006CB1; border-style: solid; background: white; }
.sig-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin: 3px 0 6px;
}
.sig-hint { font-size: 9px; color: #aaa; }
.sig-clear {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 10px; color: #aaa;
  background: none; border: 1px solid #dde4ec; border-radius: 4px;
  padding: 2px 8px; cursor: pointer;
}
.sig-name {
  border: none; border-bottom: 2px solid #c8d0d8;
  height: 36px; font-size: 14px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 10px; color: #1a2530;
  background: transparent; outline: none; width: 100%;
  margin-bottom: 3px;
}
.sig-role {
  font-size: 8px; color: #888; text-align: center;
}
.sig-date {
  font-size: 9px; color: #aaa; margin-top: 3px;
}

/* FOOTER */
.ftr {
  background: #006CB1; border-top: 2px solid #e8a020;
  padding: 4px 12px; display: flex; justify-content: space-between;
}
.ftr span { color: rgba(255,255,255,0.6); font-size: 7px; }

@media print {
  * { -webkit-print-color-adjust: economy; print-color-adjust: economy; }
  .hdr, .ftr, th, .total-row td { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  select { background-image: none !important; appearance: none !important; -webkit-appearance: none !important; }
  .sig-actions, .sig-clear, .sig-hint, .add-row-btn, .del-btn, .no-print { display: none !important; }
  .empty-row { display: none !important; }
  tr:not(.empty-row) td { border-color: #c8d0d8 !important; }

  .page { 
    box-shadow: none !important; 
    margin: 0 !important; 
    width: 100% !important;
    min-height: 0 !important;
    height: auto !important;
  }
  body { background: white !important; min-height: 0 !important; height: auto !important; padding-bottom: 0 !important; }
  .sigs { margin-top: 0 !important; }
  /* Piilota kalenterikuvake tulostuksessa */
  input[type=date]::-webkit-calendar-picker-indicator { display: none !important; }
  td input[type=date] { color: transparent !important; }
  td input[type=date]::after { content: attr(data-fi); color: #1a2530; }
  #pvm { color: transparent; }
  #pvm::after { content: attr(data-fi); color: #1a2530; }
  td, td input, td select { background: white !important; background-color: white !important; }
  td.calc { background: white !important; color: #006CB1 !important; }
  input[type=date] { -webkit-appearance: none; appearance: none; }
  /* Piilota kaikki input-ikonit */
  input::-webkit-inner-spin-button,
  input::-webkit-outer-spin-button,
  input::-webkit-calendar-picker-indicator { display: none !important; }
  .sig-canvas { height: 60px !important; }
  .table-wrap { padding-bottom: 0 !important; }
  .info-section { padding-bottom: 4px !important; }
  /* Compress spacing */
  .sigs { padding-top: 6px !important; }
  html { height: auto !important; }
  @page { size: A4 portrait; margin: 8mm 10mm; }
  /* Piilota tyhjät rivit */
  .empty-row { display: none !important; }
  tr:not(.empty-row) td { border-color: #c8d0d8 !important; }

  /* Piilota allekirjoita-painikkeet */
  .sig-actions { display: none !important; }
  /* Piilota dropdown-nuoli */
  select { -webkit-appearance: none; appearance: none; }
  /* Estä ylimääräinen sivu */
  .page { page-break-after: avoid; }
  body { margin: 0; }
  /* Estä rivien katkeaminen */
  tr { page-break-inside: avoid; }
  /* Piilota tyhjät taulukkorivit joissa placeholder */
  tr.empty-row { display: none !important; }

  body { background: white; }
  .no-print { display: none !important; }
  .del-btn { display: none !important; }
  .add-row-btn { display: none !important; }
  .page { margin: 0; box-shadow: none; width: 100%; }
}
</style>

// ── TILAAJA ──────────────────────────────────────────────────
function tilaajaPick(sel) {
  var txt = document.getElementById('tilaaja_txt');
  if (sel.value === '__muu__') {
    txt.style.display = 'block';
    txt.focus();
  } else {
    txt.style.display = 'none';

}

// ── TABLE ROWS ───────────────────────────────────────────────
var rowCount = 0;

function addRow() {
  rowCount++;
  var id = rowCount;
  var tr = document.createElement('tr');
  tr.id = 'row_' + id;

  // Rakenna kuvaus-solu — alasvetovalikko jos tarjoushinnat saatavilla, muuten tekstikenttä
  var kuvaustd;
  if (tarjousHinnat.length > 0) {
    kuvaustd = '<td><select id="desc_' + id + '" style="border:none;background:transparent;font-family:inherit;font-size:11px;color:#1a2530;outline:none;width:100%;cursor:pointer;" onchange="valitseHinta(' + id + ', this)">';
    kuvaustd += '<option value="">— Valitse —</option>';
    tarjousHinnat.forEach(function(h) {
      kuvaustd += '<option value="' + h.hinta + '" data-yksikko="' + (h.yksikko||'m²') + '">' + h.nimi + ' (' + h.hinta.toFixed(2) + ' €/' + (h.yksikko||'m²') + ')</option>';
    });
    kuvaustd += '<option value="__muu__">— Muu / kirjoita käsin —</option>';
    kuvaustd += '</select></td>';
  } else {
    kuvaustd = '<td><input type="text" id="desc_' + id + '" placeholder="Kuvaus..." style="width:100%"></td>';
  }

  tr.innerHTML = `
    <td><input type="date" style="width:100%" onfocus="try{this.showPicker()}catch(e){}" onchange="var p=this.value.split('-');this.setAttribute('data-fi',p.length===3?p[2]+'.'+p[1]+'.'+p[0]:'');"></td>
    ${kuvaustd}
    <td><input type="number" id="qty_${id}" placeholder="0" step="0.1" oninput="calcRow(${id})"></td>
    <td class="yks-cell">
      <select id="unit_${id}">
        <option>m²</option>
        <option>m</option>
        <option>kpl</option>
        <option>h</option>
        <option>erä</option>
        <option>m³</option>
        <option>tn</option>
      </select>
    </td>
    <td><input type="number" id="price_${id}" placeholder="0,00" step="0.01" oninput="calcRow(${id})"></td>
    <td class="calc" style="white-space:nowrap;" id="total_${id}">—</td>
    <td style="text-align:center"><button class="del-btn" onclick="delRow(${id})">✕</button></td>
  `;
  document.getElementById('tableBody').appendChild(tr);
  markEmptyRows();
  updateTotal();
}

function delRow(id) {
  var row = document.getElementById('row_' + id);
  if (row) row.remove();
  updateTotal();
  markEmptyRows();
}

function calcRow(id) {
  var qty = parseFloat(document.getElementById('qty_'+id).value) || 0;
  var price = parseFloat(document.getElementById('price_'+id).value) || 0;
  var total = qty * price;
  var cell = document.getElementById('total_'+id);
  if (qty > 0 && price > 0) {
    cell.textContent = total.toLocaleString('fi-FI', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
  } else {
    cell.textContent = '—';
  }
  updateTotal();
}

function markEmptyRows() {
  document.querySelectorAll('#tableBody tr').forEach(function(tr) {
    var desc = tr.querySelector('input[type="text"]');
    var qty = tr.querySelectorAll('input[type="number"]')[0];
    var price = tr.querySelectorAll('input[type="number"]')[1];
    var hasDesc = desc && desc.value && desc.value.trim() !== '';
    var hasQty = qty && parseFloat(qty.value) > 0;
    var hasPrice = price && parseFloat(price.value) > 0;
    var isEmpty = !hasDesc && !hasQty && !hasPrice;
    tr.classList.toggle('empty-row', isEmpty);
  });
}

function updateTotal() {
  var sum = 0;
  var count = 0;
  document.querySelectorAll('.calc').forEach(function(cell) {
    if (cell.id === 'totalCell') return;
    var txt = cell.textContent.replace(' €','').replace(/\s/g,'').replace(',','.');
    var val = parseFloat(txt);
    if (!isNaN(val)) { sum += val; count++; }
  });
  document.getElementById('totalCell').textContent =
    sum.toLocaleString('fi-FI', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
  // Näytä yhteensä vain kun 2+ riviä ruudulla
  // Näytä yhteensä aina kun summa > 0
  var totalRow = document.querySelector('.total-row');
  if (totalRow) {
    totalRow.style.display = '';
    if (sum > 0) {
      totalRow.classList.remove('hidden');
      totalRow.classList.add('has-sum');
    } else {
      totalRow.classList.add('hidden');
      totalRow.classList.remove('has-sum');
    }
  }
}




function updateTotal() {
  var sum = 0;
  document.querySelectorAll('.calc').forEach(function(cell) {
    if (cell.id !== 'totalCell') {
      var txt = cell.textContent.replace(' €','').replace(/\s/g,'').replace(',','.');
      var val = parseFloat(txt);
      if (!isNaN(val)) sum += val;
    }
  });
  document.getElementById('totalCell').textContent =
    sum.toLocaleString('fi-FI', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
  // Laske rivit joilla on laskettuja summia
  var filledRows = 0;
  document.querySelectorAll('.calc').forEach(function(cell) {
    if (cell.id === 'totalCell') return;
    if (cell.textContent && cell.textContent.indexOf('€') !== -1) filledRows++;
  });
  var totalRow = document.querySelector('.total-row');
  if (totalRow) totalRow.style.display = filledRows <= 1 ? 'none' : '';
}

// ── CANVAS ───────────────────────────────────────────────────
function initCanvas(id) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var drawing = false, lx=0, ly=0;

  function pos(e) {
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width/r.width, sy = canvas.height/r.height;
    if (e.touches) return {x:(e.touches[0].clientX-r.left)*sx, y:(e.touches[0].clientY-r.top)*sy};
    return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
  }
  function start(e) {
    e.preventDefault(); drawing=true;
    var p=pos(e); lx=p.x; ly=p.y;
    ctx.beginPath(); ctx.arc(lx,ly,1.5,0,Math.PI*2);
    ctx.fillStyle='#1a2530'; ctx.fill();
    canvas.classList.add('has-sig');
  }
  function draw(e) {
    if(!drawing) return; e.preventDefault();
    var p=pos(e);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#1a2530'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke();
    lx=p.x; ly=p.y;
  }
  function stop() { drawing=false; }

  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',stop);
  canvas.addEventListener('mouseleave',stop);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',stop);
}

function clearSig(id) {
  var c=document.getElementById(id);
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  c.classList.remove('has-sig');
}

// ── NÄPPÄIMISTÖNAVIGOINTI ────────────────────────────────
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement.tagName;
  if (tag !== 'INPUT' && tag !== 'SELECT') return;

  if (e.key === 'Enter' || e.key === 'ArrowRight' || e.key === 'Tab') {
    // Tab on jo oletuksena, mutta Enter ja nuoli navigoivat myös
    if (e.key === 'Tab') return; // Anna Tab toimia normaalisti
    e.preventDefault();
    moveFocus(1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    moveFocus(-1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    moveRow(1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    moveRow(-1);
  }
});

function getFocusableFields() {
  // Kerää kaikki syötekentät taulukon riveistä järjestyksessä
  var fields = [];
  document.querySelectorAll('#tableBody tr:not(.empty-row)').forEach(function(tr) {
    tr.querySelectorAll('input, select').forEach(function(el) {
      if (!el.disabled && el.offsetParent !== null) fields.push(el);
    });
  });
  return fields;
}

function moveFocus(dir) {
  var fields = getFocusableFields();
  var idx = fields.indexOf(document.activeElement);
  if (idx === -1) return;
  var next = fields[idx + dir];
  if (next) {
    next.focus();
    if (next.type === 'date') {
      // Avaa kalenteri automaattisesti
      try { next.showPicker(); } catch(e) {}
    } else if (next.tagName === 'INPUT') {
      next.select();
    }
  }
}

function moveRow(dir) {
  // Liiku saman sarakkeen seuraavalle/edelliselle riville
  var current = document.activeElement;
  var currentTd = current.closest('td');
  var currentTr = current.closest('tr');
  if (!currentTd || !currentTr) return;

  var colIndex = Array.from(currentTr.cells).indexOf(currentTd);
  var rows = Array.from(document.querySelectorAll('#tableBody tr:not(.empty-row)'));
  var rowIndex = rows.indexOf(currentTr);
  var targetRow = rows[rowIndex + dir];
  if (!targetRow) return;

  var targetTd = targetRow.cells[colIndex];
  if (!targetTd) return;
  var targetInput = targetTd.querySelector('input, select');
  if (targetInput) {
    targetInput.focus();
    if (targetInput.tagName === 'INPUT') targetInput.select();
  }
}


function fmtFi(s) {
  if (!s) return '';
  // Handle YYYY-MM-DD format
  var parts = s.split('-');
  if (parts.length === 3 && parts[0].length === 4) {
    return parts[2] + '.' + parts[1] + '.' + parts[0];
  }
  return s;
}

// Tallennetaan projektin tarjoushinnat globaalisti
var tarjousHinnat = [];

function valitseProjekti(id) {
  if (!id) {
    tarjousHinnat = [];
    return;
  }
  var sel = document.getElementById('projektiValinta');
  var opt = sel.options[sel.selectedIndex];
  if (!opt) return;

  // Fill tilaaja
  var tilaaja = opt.getAttribute('data-tilaaja');
  var tilaajaSel = document.getElementById('tilaaja');
  if (tilaajaSel) {
    for (var i=0; i<tilaajaSel.options.length; i++) {
      if (tilaajaSel.options[i].text === tilaaja) {
        tilaajaSel.selectedIndex = i;
        var txt = document.getElementById('tilaaja_txt');
        if (txt) { txt.style.display='none'; txt.value=tilaaja; }
        break;
      }
    }
  }

  // Fill työmaa
  var tyomaaInput = document.getElementById('tyomaa');
  if (tyomaaInput) tyomaaInput.value = opt.getAttribute('data-tyomaa');

  // Fill työnro
  var tyonroInput = document.getElementById('tyonro');
  if (tyonroInput) tyonroInput.value = opt.getAttribute('data-tyonro');

  // Hae tarjoushinnat Firestorestä
  fbDb2.collection('projects').doc(id).get().then(function(doc) {
    if (doc.exists && doc.data().tarjousHinnat) {
      tarjousHinnat = doc.data().tarjousHinnat;
    } else {
      tarjousHinnat = [];
    }
    // Päivitä olemassaolevat rivit
    document.querySelectorAll('#tableBody tr').forEach(function(tr) {
      var rowId = tr.id.replace('row_', '');
      paivitaKuvausKentta(rowId);
    });
  });
}

function paivitaKuvausKentta(id) {
  var td = document.getElementById('desc_' + id);
  if (!td) return;

  if (tarjousHinnat.length === 0) {
    // Ei tarjoushintoja — käytä tavallista tekstikenttää
    if (td.tagName === 'SELECT') {
      var input = document.createElement('input');
      input.type = 'text';
      input.id = 'desc_' + id;
      input.placeholder = 'Kuvaus...';
      input.style.width = '100%';
      td.parentNode.replaceChild(input, td);
    }
    return;
  }

  // On tarjoushinnat — muuta alasvetovalikoksi
  if (td.tagName !== 'SELECT') {
    var vanha = td.value || '';
    var sel = document.createElement('select');
    sel.id = 'desc_' + id;
    sel.style.cssText = 'border:none;background:transparent;font-family:inherit;font-size:11px;color:#1a2530;outline:none;width:100%;cursor:pointer;';
    sel.onchange = function() { valitseHinta(id, this); };

    var tyhja = document.createElement('option');
    tyhja.value = '';
    tyhja.textContent = '— Valitse —';
    sel.appendChild(tyhja);

    tarjousHinnat.forEach(function(h) {
      var opt = document.createElement('option');
      opt.value = h.hinta;
      opt.setAttribute('data-yksikko', h.yksikko || 'm²');
      opt.textContent = h.nimi + ' (' + h.hinta.toFixed(2) + ' €/' + (h.yksikko || 'm²') + ')';
      if (vanha === h.nimi) opt.selected = true;
      sel.appendChild(opt);
    });

    // Lisää "Muu" vaihtoehto
    var muu = document.createElement('option');
    muu.value = '__muu__';
    muu.textContent = '— Muu / kirjoita käsin —';
    sel.appendChild(muu);

    td.parentNode.replaceChild(sel, td);
  }
}

function valitseHinta(id, sel) {
  if (sel.value === '__muu__') {
    // Vaihda takaisin tekstikenttään
    var input = document.createElement('input');
    input.type = 'text';
    input.id = 'desc_' + id;
    input.placeholder = 'Kuvaus...';
    input.style.width = '100%';
    sel.parentNode.replaceChild(input, sel);
    // Tyhjennä hinta
    var priceEl = document.getElementById('price_' + id);
    if (priceEl) { priceEl.value = ''; calcRow(id); }
    return;
  }
  if (!sel.value) {
    var priceEl = document.getElementById('price_' + id);
    if (priceEl) { priceEl.value = ''; calcRow(id); }
    return;
  }
  // Aseta hinta automaattisesti
  var hinta = parseFloat(sel.value);
  var yksikko = sel.options[sel.selectedIndex].getAttribute('data-yksikko') || 'm²';
  var priceEl = document.getElementById('price_' + id);
  if (priceEl) { priceEl.value = hinta.toFixed(2); }
  // Aseta yksikkö
  var unitEl = document.getElementById('unit_' + id);
  if (unitEl) {
    for (var i = 0; i < unitEl.options.length; i++) {
      if (unitEl.options[i].value === yksikko || unitEl.options[i].text === yksikko) {
        unitEl.selectedIndex = i;
        break;
      }
    }
  }
  calcRow(id);
}

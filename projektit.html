<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#006CB1">
<title>Projektit – BC Floors Oy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
.hdr{background:#006CB1;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e8a020;position:sticky;top:0;z-index:100;}
.hdr-title{color:white;font-size:12px;font-weight:700;letter-spacing:.5px;}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:1px;}
.content{padding:14px 16px 100px;}
.proj-card{background:white;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.proj-main{padding:12px 14px;}
.proj-name{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:2px;}
.proj-sub{font-size:12px;color:#64748b;margin-top:2px;}
.proj-actions{display:flex;border-top:1px solid #f1f5f9;flex-wrap:wrap;}
.proj-btn{flex:1;min-width:80px;padding:10px 6px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;color:#006CB1;white-space:nowrap;}
.proj-btn.del{color:#ef4444;}
.proj-btn.pdf-btn{color:#10b981;}
.proj-btn:not(:last-child){border-right:1px solid #f1f5f9;}
.tarjous-section{padding:10px 14px;background:#f8fafc;border-top:1px solid #e2e8f0;display:none;}
.tarjous-section.auki{display:block;}
.tarjous-toggle{cursor:pointer;user-select:none;}
.tarkastus-section{padding:10px 14px;background:#f0fdf4;border-top:1px solid #86efac;display:none;}
.tarkastus-section.auki{display:block;}
.tarkastus-rivi{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dcfce7;font-size:12px;}
.tarkastus-rivi:last-child{border-bottom:none;}
.tark-tulos-ok{color:#16a34a;font-weight:600;}
.tark-tulos-warn{color:#92400e;font-weight:600;}
.tark-tulos-error{color:#dc2626;font-weight:600;}
.tark-pdf-btn{background:#006cb1;color:white;border:none;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;}
.tarjous-toggle:hover{opacity:0.8;}
.tarjous-title{font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;}
.hinta-rivi{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:12px;}
.hinta-rivi:last-child{border-bottom:none;}
.hinta-nimi{color:#334155;flex:1;}
.hinta-arvo{color:#006CB1;font-weight:700;margin-left:8px;white-space:nowrap;}
.hinta-yksikko{color:#94a3b8;font-size:10px;margin-left:4px;}
.pdf-status{font-size:11px;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-top:4px;}
.pdf-ok{background:#dcfce7;color:#15803d;}
.pdf-none{background:#f1f5f9;color:#64748b;}
.ai-loading{font-size:11px;color:#006CB1;padding:6px 0;display:flex;align-items:center;gap:6px;}
.spinner{width:14px;height:14px;border:2px solid #e2e8f0;border-top-color:#006CB1;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:10px 16px 14px;}
.btn-add{width:100%;padding:14px;border-radius:12px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:white;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;color:#1e293b;}
.sheet-close{float:right;background:#f1f5f9;border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;line-height:28px;text-align:center;}
.ff{margin-bottom:12px;}
.ff label{display:block;font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.ff input,.ff select{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;color:#1e293b;background:white;outline:none;}
.ff input:focus,.ff select:focus{border-color:#006CB1;}
.btn-save{width:100%;padding:14px;border-radius:10px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.pdf-upload-area{border:2px dashed #e2e8f0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-top:8px;color:#64748b;font-size:13px;}
.pdf-upload-area:hover{border-color:#006CB1;background:#f0f9ff;}
.pdf-upload-area.has-file{border-color:#10b981;background:#f0fdf4;color:#15803d;}
#pdfInput{display:none;}
.ai-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px;font-size:12px;color:#1d4ed8;margin-top:8px;}
.detalji-overlay{display:none;position:fixed;inset:0;background:white;z-index:300;overflow-y:auto;}
.detalji-overlay.open{display:block;}
.detalji-hdr{background:#006CB1;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid #e8a020;position:sticky;top:0;}
.detalji-back{background:rgba(255,255,255,.2);border:none;color:white;font-size:18px;cursor:pointer;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.detalji-title{color:white;font-size:14px;font-weight:700;}
.detalji-content{padding:14px 16px 60px;}
.detalji-section{background:white;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;}
.detalji-section-title{background:#f8fafc;padding:10px 14px;font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #e2e8f0;}
.detalji-row{display:flex;padding:8px 14px;border-bottom:1px solid #f1f5f9;font-size:13px;}
.detalji-row:last-child{border-bottom:none;}
.detalji-label{color:#64748b;min-width:120px;font-size:12px;}
.detalji-val{color:#1e293b;font-weight:500;flex:1;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">BC FLOORS OY</div>
    <div class="hdr-sub">Projektipankki</div>
  </div>
  <button onclick="asetaApiAvain()" style="background:rgba(255,255,255,.15);border:none;color:white;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;" title="Aseta Anthropic API-avain">🔑 API</button>
</div>

<div class="content" id="projektilista">
  <div class="empty">Ladataan projekteja...</div>
</div>

<div class="bottom-nav">
  <button class="btn-add" onclick="avaaLisaysSheet()">+ Uusi projekti</button>
</div>

<!-- Uusi projekti -sheet -->
<div class="overlay" id="lisaysOverlay">
  <div class="sheet">
    <button class="sheet-close" onclick="suljeSheet('lisaysOverlay')">✕</button>
    <div class="sheet-title">Uusi projekti</div>
    <div class="ff">
      <label>Projekti / Kohde</label>
      <input type="text" id="uusiTyomaa" placeholder="esim. Akun Tehdas, Tampere">
    </div>
    <div class="ff">
      <label>Tilaaja</label>
      <input type="text" id="uusiTilaaja" placeholder="esim. Tekova Oy">
    </div>
    <div class="ff">
      <label>Työnumero</label>
      <input type="text" id="uusiTyonro" placeholder="esim. 5015">
    </div>
    <div class="ff">
      <label>Yhteyshenkilö</label>
      <input type="text" id="uusiYhteys" placeholder="esim. Markus Illikainen">
    </div>
    <div class="ff">
      <label>Osoite</label>
      <input type="text" id="uusiOsoite">
    </div>
    <div class="ff">
      <label>📎 Lataa tarjous PDF (valinnainen)</label>
      <div class="pdf-upload-area" id="uploadArea" onclick="document.getElementById('pdfInput').click()">
        <div>📄 Klikkaa valitaksesi PDF</div>
        <div style="font-size:11px;margin-top:4px;color:#94a3b8">Tarjous tallentuu projektin yhteyteen</div>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" onchange="pdfValittu(this)">
    </div>
    <button class="btn-save" onclick="tallennaProjekti()">💾 Tallenna projekti</button>
  </div>
</div>

<!-- PDF-lataus olemassaolevaan projektiin -->
<div class="overlay" id="pdfOverlay">
  <div class="sheet">
    <button class="sheet-close" onclick="suljeSheet('pdfOverlay')">✕</button>
    <div class="sheet-title" id="pdfSheetTitle">Lataa tarjous</div>
    <div class="ff">
      <label>📎 Valitse tarjous PDF</label>
      <div class="pdf-upload-area" id="uploadArea2" onclick="document.getElementById('pdfInput2').click()">
        <div>📄 Klikkaa valitaksesi PDF</div>
        <div style="font-size:11px;margin-top:4px;color:#94a3b8">AI lukee hinnat automaattisesti</div>
      </div>
      <input type="file" id="pdfInput2" accept=".pdf" onchange="pdfValittu2(this)">
    </div>
    <button class="btn-save" id="pdfSaveBtn" onclick="tallennaUusiPdf()" style="display:none">🤖 Tallenna + Lue hinnat AI:lla</button>
  </div>
</div>

<!-- Projektin detalji-näkymä -->
<div class="detalji-overlay" id="detaljitOverlay">
  <div class="detalji-hdr">
    <button class="detalji-back" onclick="suljeDetalji()">←</button>
    <div class="detalji-title" id="detaljitTitle">Projekti</div>
  </div>
  <div class="detalji-content" id="detaljitSisalto"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script>


// ── Toggle & lataa tarkastukset ──
var tarkastusCache = {};
function toggleTarkastukset(projektinId) {
  var el = document.getElementById('tarkastukset-' + projektinId);
  if (!el) return;
  var auki = el.classList.toggle('auki');
  if (auki && !tarkastusCache[projektinId]) {
    // Lataa Firestoresta
    db.collection('raudoitustarkastukset')
      .where('projektiId', '==', projektinId)
      .orderBy('luotu', 'desc')
      .get()
      .then(function(snap) {
        tarkastusCache[projektinId] = true;
        if (snap.empty) {
          el.innerHTML = '<div style="font-size:12px;color:#6b7280">Ei tallennettuja tarkastuksia</div>';
          return;
        }
        var html = '<div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:6px">📋 TARKASTUKSET</div>';
        snap.forEach(function(doc) {
          var t = doc.data();
          var pvm = t.paivamaara ? t.paivamaara.split('-').reverse().join('.') : '';
          var tulosClass = t.tulos === 'ok' ? 'tark-tulos-ok' : t.tulos === 'warn' ? 'tark-tulos-warn' : 'tark-tulos-error';
          var tulosTxt = t.tulos === 'ok' ? '✅ Hyväksytty' : t.tulos === 'warn' ? '⚠️ Huomautuksella' : '❌ Hylätty';
          html += '<div class="tarkastus-rivi" style="flex-direction:column;align-items:flex-start;gap:6px">';
          html += '<div style="display:flex;justify-content:space-between;width:100%;align-items:center">';
          html += '<div><div style="font-weight:600">' + pvm + '</div>';
          html += '<div style="color:#6b7280">' + (t.valualue || '') + '</div>';
          html += '<div class="' + tulosClass + '">' + tulosTxt + '</div></div>';
          html += '<div style="display:flex;gap:4px">';
          html += '<button class="tark-pdf-btn" onclick="lataaVanhaPDF(&quot;' + doc.id + '&quot;)">PDF</button>';
          html += '<button class="tark-pdf-btn" onclick="poistaTarkastus(&quot;' + doc.id + '&quot;, &quot;' + projektinId + '&quot;)" style="background:#ef4444">🗑</button>';
          html += '</div></div>';
          // Kuvat
          if (t.kuvat && t.kuvat.length > 0) {
            html += '<div style="display:flex;gap:4px;flex-wrap:wrap">';
            t.kuvat.forEach(function(url) {
              html += '<img src="' + url + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid #86efac;cursor:pointer" onclick="window.open(this.src)">';
            });
            html += '</div>';
          }
          html += '</div>';
        });
        el.innerHTML = html;
      })
      .catch(function(err) {
        el.innerHTML = '<div style="font-size:12px;color:#dc2626">Virhe: ' + err.message + '</div>';
      });
  }
}

// ── Lataa vanha tarkastus PDF:nä suoraan ──
function lataaVanhaPDF(tarkastusId) {
  var btn = event.target;
  btn.textContent = '⏳';
  btn.disabled = true;

  db.collection('raudoitustarkastukset').doc(tarkastusId).get().then(function(doc) {
    if (!doc.exists) { btn.textContent = 'PDF'; btn.disabled = false; return; }
    var t = doc.data();
    generoimPDF(t);
    btn.textContent = 'PDF';
    btn.disabled = false;
  }).catch(function(err) {
    alert('Virhe: ' + err.message);
    btn.textContent = 'PDF';
    btn.disabled = false;
  });
}

// ── Generoi PDF Firestore-datasta ──
function generoimPDF(t) {
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = function() { _generoimPDF(t); };
  // Jos jsPDF jo ladattu
  if (window.jspdf) { _generoimPDF(t); return; }
  document.head.appendChild(script);
}

function _generoimPDF(t) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  var PW=210, PH=297, ML=14, MR=14, CW=PW-ML-MR;
  var BLUE=[0,108,177], BLUE2=[46,109,164], GRAY=[242,245,248], GBORDER=[200,208,216];
  var WHITE=[255,255,255], TEXT=[26,26,26], TEXT2=[107,114,128];
  var OK=[22,163,74], OK_BG=[240,253,244], ERR=[220,38,38], ERR_BG=[254,242,242];
  var AMBER=[146,64,14], AMBER_BG=[255,251,235], GOLD=[232,160,32];
  var y = 0;

  // HEADER
  doc.setFillColor(...BLUE);
  doc.rect(0, 0, PW, 24, 'F');
  doc.setFillColor(...GOLD);
  doc.rect(0, 24, PW, 1.2, 'F');
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text('VALUNALOITUSPÖYTÄKIRJA', PW-MR, 11, {align:'right'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setTextColor(200,228,245);
  doc.text('Raudoitustarkastus  |  Laadunvarmistus', PW-MR, 17, {align:'right'});
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica','bold');
  doc.setFontSize(14);
  doc.text('BC Floors', ML+2, 15);
  y = 30;

  function secTitle(title) {
    doc.setFillColor(...BLUE2);
    doc.rect(ML, y, CW, 6.5, 'F');
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica','bold');
    doc.setFontSize(7.5);
    doc.text(title.toUpperCase(), ML+3, y+4.5);
    y += 6.5;
  }

  function labelValRow(pairs, widths) {
    var x = ML;
    pairs.forEach(function(p, i) {
      doc.setFillColor(...GRAY); doc.setDrawColor(...GBORDER);
      doc.rect(x, y, widths[i], 5, 'FD');
      doc.setTextColor(...BLUE2); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      doc.text(p.label.toUpperCase(), x+2, y+3.5);
      x += widths[i];
    });
    y += 5;
    x = ML;
    pairs.forEach(function(p, i) {
      doc.setFillColor(...WHITE); doc.setDrawColor(...GBORDER);
      doc.rect(x, y, widths[i], 7.5, 'FD');
      doc.setTextColor(...TEXT); doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text(p.value||'', x+2, y+5.5);
      x += widths[i];
    });
    y += 7.5;
  }

  // Perustiedot
  var pvm = t.paivamaara ? t.paivamaara.split('-').reverse().join('.') : '';
  secTitle('1. Projektin perustiedot');
  labelValRow([{label:'Tilaaja',value:''},{label:'Projekti / Kohde',value:t.projekti||''}],[CW/2,CW/2]);
  labelValRow([{label:'Työnumero',value:t.tyonumero||''},{label:'Valualue / POS',value:t.valualue||''},{label:'Päivämäärä',value:pvm}],[CW*0.25,CW*0.45,CW*0.30]);
  labelValRow([{label:'Tarkastaja',value:t.tarkastaja||''},{label:'Tilaajan edustaja',value:t.tilaaja||''}],[CW/2,CW/2]);
  y += 3;

  // Tarkastuskohteet
  var checkItems = [
    {id:'alusrakenne',main:'Alusrakenne ja eristeet',sub:'Irrotuskaistat, radonsuoja, seinänsuojamuovit, laakerimuovit'},
    {id:'paaraudoitus',main:'Pääraudoitus asennettu',sub:'Verkko / teräkset oikealla korkeudella'},
    {id:'lisaraudoitus',main:'Lisäraudoitus',sub:'Korkeus ja etäisyys tarkistettu'},
    {id:'varusteet',main:'Varusteet asennettu',sub:'Kaivot, kynnysraudat, liikuntasaumat — korko tarkistettu'},
    {id:'kaadot',main:'Kaadot käyty läpi valuryhmän kanssa',sub:'Tarvittaessa merkitty maastoon'},
    {id:'betoni',main:'Betoni',sub:'Lujuusluokka, rasitusluokat, kuitumäärä/tyyppi'},
    {id:'olosuhteet',main:'Olosuhteet OK',sub:'Lämpötila yli +10°C lattian rajassa, suojaus sääilmiöiltä, riittävä ilmanvaihto ja valaistus'},
  ];
  secTitle('2. Tarkastuskohteet');
  var C1=10, C3=22, C2=CW-C1-C3;
  doc.setFillColor(227,239,250); doc.setDrawColor(...GBORDER);
  doc.rect(ML, y, CW, 5.5, 'FD');
  doc.setTextColor(...BLUE2); doc.setFont('helvetica','bold'); doc.setFontSize(7);
  doc.text('#', ML+C1/2, y+3.8, {align:'center'});
  doc.text('Tarkastuskohde', ML+C1+2, y+3.8);
  doc.text('Tulos', ML+C1+C2+C3/2, y+3.8, {align:'center'});
  y += 5.5;

  checkItems.forEach(function(item, i) {
    var st = t.tarkastuskohteet ? t.tarkastuskohteet[item.id] : null;
    var rh = 10;
    var fill = st==='ok' ? OK_BG : st==='error' ? ERR_BG : WHITE;
    doc.setFillColor(...fill); doc.setDrawColor(...GBORDER);
    doc.rect(ML, y, CW, rh, 'FD');
    var nc = st==='ok' ? OK : st==='error' ? ERR : TEXT2;
    doc.setTextColor(...nc); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text(String(i+1), ML+C1/2, y+rh/2+1, {align:'center'});
    doc.setTextColor(...TEXT); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text(item.main, ML+C1+2, y+4);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...TEXT2);
    doc.text(item.sub, ML+C1+2, y+8);
    if (st==='ok') {
      doc.setFillColor(...OK); doc.roundedRect(ML+C1+C2+2, y+2, 18, 6, 1, 1, 'F');
      doc.setTextColor(...WHITE); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      doc.text('OK', ML+C1+C2+11, y+6.2, {align:'center'});
    } else if (st==='error') {
      doc.setFillColor(...ERR); doc.roundedRect(ML+C1+C2+2, y+2, 18, 6, 1, 1, 'F');
      doc.setTextColor(...WHITE); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      doc.text('VIRHE', ML+C1+C2+11, y+6.2, {align:'center'});
    }
    y += rh;
  });
  y += 3;

  // Huomautukset
  secTitle('3. Huomautukset & Korjausvaatimukset');
  doc.setFillColor(...WHITE); doc.setDrawColor(...GBORDER);
  doc.rect(ML, y, CW, 16, 'FD');
  if (t.huomautukset) {
    doc.setTextColor(...TEXT); doc.setFont('helvetica','normal'); doc.setFontSize(8);
    var lines = doc.splitTextToSize(t.huomautukset, CW-6);
    doc.text(lines, ML+3, y+5);
  }
  y += 19;

  // Tulos
  secTitle('4. Tarkastuksen tulos');
  var tulosTxt = t.tulos==='ok'?'Hyväksytty — valu voidaan aloittaa':t.tulos==='warn'?'Hyväksytty huomautuksella':'Hylätty — korjattava ennen valua';
  var tBg = t.tulos==='ok'?OK_BG:t.tulos==='warn'?AMBER_BG:ERR_BG;

            ['uusiOsoite', tiedot.osoite]
          ];
          kentat.forEach(function(p) {
            var el = document.getElementById(p[0]);

              var uusi = el.cloneNode(false);
              uusi.value = p[1];
              uusi.placeholder = '';
              el.parentNode.replaceChild(uusi, el);

function taytaKentat() {
  var tiedot = window._aiTiedot;

  var kentat = [

// ── AI lukee KAIKKI tiedot PDF:stä ──
async function lueKaikkiTiedotAIlla(pdfBase64) {
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': haeApiAvain(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 }
            },
            {
              type: 'text',
              text: 'Lue tästä betonilattiatarjous-PDF:stä kaikki tiedot. Palauta VAIN JSON-muodossa ilman mitään muuta tekstiä tai markdown-merkkejä:\n{\n  "tyomaa": "kohteen nimi ja paikkakunta",\n  "tilaaja": "tilaajan yritysnimi",\n  "tyonro": "työnumero",\n  "yhteys": "tilaajan yhteyshenkilön nimi",\n  "osoite": "kohteen osoite jos mainittu",\n  "hinnat": [\n    {"nimi": "Pos 1a, AP 2", "hinta": 29.30, "yksikko": "m²"},\n    ...\n  ]\n}\nSisällytä KAIKKI hinnat mukaan lukien lisä- ja muutostöiden yksikköhinnat. Jos jokin tieto puuttuu, jätä kenttä tyhjäksi merkkijonona.'
            }
          ]
        }]
      })
    });
    var data = await response.json();
    // Tarkista API-vastaus
    if (!data.content || !data.content[0]) {
      console.error('API virhe:', data);
      return null;
    }
    var teksti = data.content[0].text.trim();
    teksti = teksti.replace(/```json|```/g, '').trim();
    return JSON.parse(teksti);
  } catch(e) {
    console.error('AI virhe:', e);
    return null;
  }
}

// ── Vanha lueHinnatAIlla (käytössä PDF-vaihto-toiminnossa) ──
async function lueHinnatAIlla(pdfBase64) {
  var tiedot = await lueKaikkiTiedotAIlla(pdfBase64);
  return tiedot ? { hinnat: tiedot.hinnat } : null;
}

// ── Avaa PDF ──
function avaaPdf(projektinId) {
  db.collection('projects').doc(projektinId).get().then(function(doc) {
    if (doc.exists && doc.data().pdfBase64) {
      var byteStr = atob(doc.data().pdfBase64);
      var ab = new ArrayBuffer(byteStr.length);
      var ia = new Uint8Array(ab);
      for (var i = 0; i < byteStr.length; i++) ia[i] = byteStr.charCodeAt(i);
      var blob = new Blob([ab], {type: 'application/pdf'});
      var url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    }
  });
}

  if (div.style.display !== 'none') { div.style.display = 'none'; return; }
  div.style.display = 'block';
  div.innerHTML = '<div style="font-size:11px;color:#6b7280">⏳ Ladataan dokumentteja...</div>';
  try {
    var snap = await fbDb.collection('projects').doc(projektinId).collection('dokumentit').orderBy('luotu', 'desc').get();
    if (snap.empty) {
      div.innerHTML = '<div style="font-size:11px;color:#6b7280">Ei dokumentteja.</div>';
      return;
    }
    var html = '<div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:6px;">📦 Betonointidokumentit</div>';
    snap.forEach(function(d) {
      var dok = d.data();
      html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f1f5f9;">';
      html += '<span style="font-size:11px;color:#374151;flex:1;">📦 ' + (dok.nimi || 'dokumentti') + '</span>';
      html += '<span style="font-size:10px;color:#94a3b8;">' + (dok.luotu ? dok.luotu.substring(0,10) : '') + '</span>';
      var btnId = 'dlbtn-' + d.id;
      html += '<button id="' + btnId + '" data-polku="' + dok.polku + '" data-nimi="' + (dok.nimi||'tiedosto') + '" onclick="lataaStorageTiedosto(this.dataset.polku, this.dataset.nimi)" style="background:#2e6da4;color:white;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;">⬇ Lataa</button>';
      html += '</div>';
    });
    div.innerHTML = html;
  } catch(e) {
    div.innerHTML = '<div style="font-size:11px;color:red;">Virhe: ' + e.message + '</div>';
  }
}

async function lataaStorageTiedosto(polku, nimi) {
  try {
    var url = await fbStorage.ref(polku).getDownloadURL();
    var a = document.createElement('a');
    a.href = url;
    a.download = nimi;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) {
    alert('Lataus epäonnistui: ' + e.message);
  }
}

// ── Avaa projektin detalji ──
function avaaDetalji(projektinId) {
  db.collection('projects').doc(projektinId).get().then(function(doc) {
    if (!doc.exists) return;
    var p = doc.data();
    document.getElementById('detaljitTitle').textContent = p.tyomaa || 'Projekti';

    var html = '';

    // Perustiedot
    html += '<div class="detalji-section">';
    html += '<div class="detalji-section-title">📋 Perustiedot</div>';
    if (p.tilaaja) html += '<div class="detalji-row"><span class="detalji-label">Tilaaja</span><span class="detalji-val">' + p.tilaaja + '</span></div>';
    if (p.tyonro) html += '<div class="detalji-row"><span class="detalji-label">Työnumero</span><span class="detalji-val">' + p.tyonro + '</span></div>';
    if (p.yhteys) html += '<div class="detalji-row"><span class="detalji-label">Yhteyshenkilö</span><span class="detalji-val">' + p.yhteys + '</span></div>';
    if (p.osoite) html += '<div class="detalji-row"><span class="detalji-label">Osoite</span><span class="detalji-val">' + p.osoite + '</span></div>';
    if (p.luotu) html += '<div class="detalji-row"><span class="detalji-label">Lisätty</span><span class="detalji-val">' + p.luotu.split('T')[0] + '</span></div>';
    html += '</div>';

    // Tarjous
    html += '<div class="detalji-section">';
    html += '<div class="detalji-section-title">📄 Tarjous</div>';
    if (p.pdfBase64) {
      if (p.pdfLadattu) html += '<div class="detalji-row"><span class="detalji-label">Ladattu</span><span class="detalji-val">' + p.pdfLadattu.split('T')[0] + '</span></div>';
      html += '<div class="detalji-row"><button onclick="avaaPdf(\''+doc.id+'\')" style="background:#006CB1;color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:4px 0">📄 Avaa tarjous PDF</button></div>';
    } else {
      html += '<div class="detalji-row"><span style="color:#94a3b8;font-size:13px">Ei tarjousta ladattu</span></div>';
    }
    html += '<div class="detalji-row"><button onclick="suljeDetalji();avaaLataaPdf(\''+doc.id+'\',\''+( p.tyomaa||'').replace(/'/g,"\\'")+'\')" style="background:#f8fafc;border:1.5px solid #e2e8f0;color:#006CB1;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:4px 0">📎 '+(p.pdfBase64?'Vaihda PDF':'Lataa PDF')+'</button></div>';
    html += '</div>';

    // Hinnat
    if (p.tarjousHinnat && p.tarjousHinnat.length > 0) {
      html += '<div class="detalji-section">';
      html += '<div class="detalji-section-title">💰 Tarjoushinnat</div>';
      p.tarjousHinnat.forEach(function(h) {
        html += '<div class="detalji-row"><span class="detalji-label">' + h.nimi + '</span>';
        html += '<span class="detalji-val" style="color:#006CB1;font-weight:700">' + h.hinta.toFixed(2) + ' € / ' + (h.yksikko||'m²') + '</span></div>';
      });
      html += '</div>';
    }

    // Toiminnot
    html += '<div style="margin-top:16px">';
    html += '<button onclick="poistaProjekti(\''+doc.id+'\',\''+( p.tyomaa||'').replace(/'/g,"\\'")+'\')" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid #fca5a5;background:white;color:#ef4444;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">🗑 Poista projekti</button>';
    html += '</div>';

    document.getElementById('detaljitSisalto').innerHTML = html;
    document.getElementById('detaljitOverlay').classList.add('open');
  });
}

function suljeDetalji() {
  document.getElementById('detaljitOverlay').classList.remove('open');
}
</script>

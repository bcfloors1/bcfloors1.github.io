<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#006CB1">
<title>Projektit – BC Floors Oy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
.hdr{background:#006CB1;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e8a020;position:sticky;top:0;z-index:100;}
.hdr-title{color:white;font-size:12px;font-weight:700;letter-spacing:.5px;}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:1px;}
.content{padding:14px 16px 100px;}
.proj-card{background:white;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.proj-main{padding:12px 14px;}
.proj-name{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:2px;}
.proj-sub{font-size:12px;color:#64748b;margin-top:2px;}
.proj-actions{display:flex;border-top:1px solid #f1f5f9;flex-wrap:wrap;}
.proj-btn{flex:1;min-width:80px;padding:10px 6px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;color:#006CB1;white-space:nowrap;}
.proj-btn.del{color:#ef4444;}
.proj-btn.pdf-btn{color:#10b981;}
.proj-btn:not(:last-child){border-right:1px solid #f1f5f9;}
.tarjous-section{padding:10px 14px;background:#f8fafc;border-top:1px solid #e2e8f0;}
.tarjous-title{font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;}
.hinta-rivi{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:12px;}
.hinta-rivi:last-child{border-bottom:none;}
.hinta-nimi{color:#334155;flex:1;}
.hinta-arvo{color:#006CB1;font-weight:700;margin-left:8px;white-space:nowrap;}
.hinta-yksikko{color:#94a3b8;font-size:10px;margin-left:4px;}
.pdf-status{font-size:11px;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-top:4px;}
.pdf-ok{background:#dcfce7;color:#15803d;}
.pdf-none{background:#f1f5f9;color:#64748b;}
.ai-loading{font-size:11px;color:#006CB1;padding:6px 0;display:flex;align-items:center;gap:6px;}
.spinner{width:14px;height:14px;border:2px solid #e2e8f0;border-top-color:#006CB1;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:10px 16px 14px;}
.btn-add{width:100%;padding:14px;border-radius:12px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:white;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;color:#1e293b;}
.sheet-close{float:right;background:#f1f5f9;border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;line-height:28px;text-align:center;}
.ff{margin-bottom:12px;}
.ff label{display:block;font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.ff input,.ff select{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;color:#1e293b;background:white;outline:none;}
.ff input:focus,.ff select:focus{border-color:#006CB1;}
.btn-save{width:100%;padding:14px;border-radius:10px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.pdf-upload-area{border:2px dashed #e2e8f0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-top:8px;color:#64748b;font-size:13px;}
.pdf-upload-area:hover{border-color:#006CB1;background:#f0f9ff;}
.pdf-upload-area.has-file{border-color:#10b981;background:#f0fdf4;color:#15803d;}
#pdfInput{display:none;}
.ai-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px;font-size:12px;color:#1d4ed8;margin-top:8px;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">BC FLOORS OY</div>
    <div class="hdr-sub">Projektipankki</div>
  </div>
</div>

<div class="content" id="projektilista">
  <div class="empty">Ladataan projekteja...</div>
</div>

<div class="bottom-nav">
  <button class="btn-add" onclick="avaaLisaysSheet()">+ Uusi projekti</button>
</div>

<!-- Uusi projekti -sheet -->
<div class="overlay" id="lisaysOverlay">
  <div class="sheet">
    <button class="sheet-close" onclick="suljeSheet('lisaysOverlay')">✕</button>
    <div class="sheet-title">Uusi projekti</div>
    <div class="ff">
      <label>Projekti / Kohde</label>
      <input type="text" id="uusiTyomaa" placeholder="esim. Akun Tehdas, Tampere">
    </div>
    <div class="ff">
      <label>Tilaaja</label>
      <input type="text" id="uusiTilaaja" placeholder="esim. Tekova Oy">
    </div>
    <div class="ff">
      <label>Työnumero</label>
      <input type="text" id="uusiTyonro" placeholder="esim. 5015">
    </div>
    <div class="ff">
      <label>Yhteyshenkilö</label>
      <input type="text" id="uusiYhteys" placeholder="esim. Markus Illikainen">
    </div>
    <div class="ff">
      <label>Osoite</label>
      <input type="text" id="uusiOsoite">
    </div>
    <div class="ff">
      <label>📎 Lataa tarjous PDF (valinnainen)</label>
      <div class="pdf-upload-area" id="uploadArea" onclick="document.getElementById('pdfInput').click()">
        <div>📄 Klikkaa valitaksesi PDF</div>
        <div style="font-size:11px;margin-top:4px;color:#94a3b8">Hinnat luetaan automaattisesti AI:lla</div>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" onchange="pdfValittu(this)">
      <div class="ai-info" id="aiInfo" style="display:none">
        🤖 AI lukee tarjouksesta hinnat automaattisesti ja tallentaa ne projektiin
      </div>
    </div>
    <button class="btn-save" onclick="tallennaProjekti()">💾 Tallenna projekti</button>
  </div>
</div>

<!-- PDF-lataus olemassaolevaan projektiin -->
<div class="overlay" id="pdfOverlay">
  <div class="sheet">
    <button class="sheet-close" onclick="suljeSheet('pdfOverlay')">✕</button>
    <div class="sheet-title" id="pdfSheetTitle">Lataa tarjous</div>
    <div class="ff">
      <label>📎 Valitse tarjous PDF</label>
      <div class="pdf-upload-area" id="uploadArea2" onclick="document.getElementById('pdfInput2').click()">
        <div>📄 Klikkaa valitaksesi PDF</div>
        <div style="font-size:11px;margin-top:4px;color:#94a3b8">AI lukee hinnat automaattisesti</div>
      </div>
      <input type="file" id="pdfInput2" accept=".pdf" onchange="pdfValittu2(this)">
    </div>
    <button class="btn-save" id="pdfSaveBtn" onclick="tallennaUusiPdf()" style="display:none">🤖 Tallenna + Lue hinnat AI:lla</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
var fbConfig = {
  apiKey: "AIzaSyB_SEcmhmzBBldkbh8CQYL7ncQGVyZIDM4",
  authDomain: "bcfloors-a25ea.firebaseapp.com",
  projectId: "bcfloors-a25ea",
  storageBucket: "bcfloors-a25ea.firebasestorage.app",
  messagingSenderId: "160878550016",
  appId: "1:160878550016:web:9d42f64d0d02375a178ce5"
};
if (!firebase.apps.length) firebase.initializeApp(fbConfig);
var db = firebase.firestore();

var valittuPdfBase64 = null;
var valittuPdfBase642 = null;
var aktiivisenProjektinId = null;

// ── Näytä toast ──
function naytaToast(teksti) {
  var t = document.getElementById('toast');
  t.textContent = teksti;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── Avaa/sulje sheetit ──
function avaaLisaysSheet() {
  document.getElementById('lisaysOverlay').classList.add('open');
}
function suljeSheet(id) {
  document.getElementById(id).classList.remove('open');
}

// ── PDF valittu (uusi projekti) ──
function pdfValittu(input) {
  if (!input.files[0]) return;
  var file = input.files[0];
  if (file.size > 900000) { alert('PDF on liian suuri (max ~700KB)'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    valittuPdfBase64 = e.target.result.split(',')[1];
    document.getElementById('uploadArea').innerHTML =
      '<div>✅ ' + file.name + '</div><div style="font-size:11px;margin-top:4px">(' + Math.round(file.size/1024) + ' KB)</div>';
    document.getElementById('uploadArea').classList.add('has-file');
    document.getElementById('aiInfo').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// ── PDF valittu (olemassaoleva projekti) ──
function pdfValittu2(input) {
  if (!input.files[0]) return;
  var file = input.files[0];
  if (file.size > 900000) { alert('PDF on liian suuri (max ~700KB)'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    valittuPdfBase642 = e.target.result.split(',')[1];
    document.getElementById('uploadArea2').innerHTML =
      '<div>✅ ' + file.name + '</div><div style="font-size:11px;margin-top:4px">(' + Math.round(file.size/1024) + ' KB)</div>';
    document.getElementById('uploadArea2').classList.add('has-file');
    document.getElementById('pdfSaveBtn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// ── AI lukee hinnat PDF:stä ──
async function lueHinnatAIlla(pdfBase64) {
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 }
            },
            {
              type: 'text',
              text: 'Lue tästä tarjous-PDF:stä kaikki hintatiedot. Palauta VAIN JSON-muodossa ilman mitään muuta tekstiä:\n{\n  "hinnat": [\n    {"nimi": "Pos 1a, AP 2", "hinta": 29.30, "yksikko": "m²"},\n    ...\n  ]\n}\nSisällytä kaikki hinnat myös lisä- ja muutostöiden yksikköhinnat.'
            }
          ]
        }]
      })
    });
    var data = await response.json();
    var teksti = data.content[0].text.trim();
    // Poista mahdolliset markdown-koodimerkit
    teksti = teksti.replace(/```json|```/g, '').trim();
    return JSON.parse(teksti);
  } catch(e) {
    console.error('AI virhe:', e);
    return null;
  }
}

// ── Tallenna uusi projekti ──
async function tallennaProjekti() {
  var tyomaa = document.getElementById('uusiTyomaa').value.trim();
  if (!tyomaa) { alert('Kirjoita projektin nimi'); return; }

  var btn = document.querySelector('#lisaysOverlay .btn-save');
  btn.textContent = '⏳ Tallennetaan...';
  btn.disabled = true;

  var projektinTiedot = {
    tyomaa: tyomaa,
    tilaaja: document.getElementById('uusiTilaaja').value.trim(),
    tyonro: document.getElementById('uusiTyonro').value.trim(),
    yhteys: document.getElementById('uusiYhteys').value.trim(),
    osoite: document.getElementById('uusiOsoite').value.trim(),
    luotu: new Date().toISOString()
  };

  // PDF mukana?
  if (valittuPdfBase64) {
    btn.textContent = '🤖 AI lukee hintoja...';
    projektinTiedot.pdfBase64 = valittuPdfBase64;
    projektinTiedot.pdfLadattu = new Date().toISOString();

    var hinnat = await lueHinnatAIlla(valittuPdfBase64);
    if (hinnat && hinnat.hinnat) {
      projektinTiedot.tarjousHinnat = hinnat.hinnat;
    }
  }

  db.collection('projects').add(projektinTiedot)
    .then(function() {
      suljeSheet('lisaysOverlay');
      // Tyhjennä lomake
      ['uusiTyomaa','uusiTilaaja','uusiTyonro','uusiYhteys','uusiOsoite'].forEach(function(id){
        document.getElementById(id).value = '';
      });
      document.getElementById('uploadArea').innerHTML = '<div>📄 Klikkaa valitaksesi PDF</div><div style="font-size:11px;margin-top:4px;color:#94a3b8">Hinnat luetaan automaattisesti AI:lla</div>';
      document.getElementById('uploadArea').classList.remove('has-file');
      document.getElementById('aiInfo').style.display = 'none';
      valittuPdfBase64 = null;
      btn.textContent = '💾 Tallenna projekti';
      btn.disabled = false;
      naytaToast('✅ Projekti tallennettu!');
    })
    .catch(function(e) {
      alert('Virhe: ' + e.message);
      btn.textContent = '💾 Tallenna projekti';
      btn.disabled = false;
    });
}

// ── Avaa PDF-lataus olemassaolevalle projektille ──
function avaaLataaPdf(projektinId, projektinNimi) {
  aktiivisenProjektinId = projektinId;
  valittuPdfBase642 = null;
  document.getElementById('pdfSheetTitle').textContent = '📎 Tarjous: ' + projektinNimi;
  document.getElementById('uploadArea2').innerHTML = '<div>📄 Klikkaa valitaksesi PDF</div><div style="font-size:11px;margin-top:4px;color:#94a3b8">AI lukee hinnat automaattisesti</div>';
  document.getElementById('uploadArea2').classList.remove('has-file');
  document.getElementById('pdfSaveBtn').style.display = 'none';
  document.getElementById('pdfOverlay').classList.add('open');
}

// ── Tallenna PDF olemassaolevaan projektiin ──
async function tallennaUusiPdf() {
  if (!valittuPdfBase642 || !aktiivisenProjektinId) return;

  var btn = document.getElementById('pdfSaveBtn');
  btn.textContent = '🤖 AI lukee hintoja...';
  btn.disabled = true;

  var paivitys = {
    pdfBase64: valittuPdfBase642,
    pdfLadattu: new Date().toISOString()
  };

  var hinnat = await lueHinnatAIlla(valittuPdfBase642);
  if (hinnat && hinnat.hinnat) {
    paivitys.tarjousHinnat = hinnat.hinnat;
  }

  db.collection('projects').doc(aktiivisenProjektinId).update(paivitys)
    .then(function() {
      suljeSheet('pdfOverlay');
      btn.textContent = '🤖 Tallenna + Lue hinnat AI:lla';
      btn.disabled = false;
      naytaToast('✅ Tarjous tallennettu! Hinnat luettu.');
    })
    .catch(function(e) {
      alert('Virhe: ' + e.message);
      btn.textContent = '🤖 Tallenna + Lue hinnat AI:lla';
      btn.disabled = false;
    });
}

// ── Avaa PDF ──
function avaaPdf(projektinId) {
  db.collection('projects').doc(projektinId).get().then(function(doc) {
    if (doc.exists && doc.data().pdfBase64) {
      var byteStr = atob(doc.data().pdfBase64);
      var ab = new ArrayBuffer(byteStr.length);
      var ia = new Uint8Array(ab);
      for (var i = 0; i < byteStr.length; i++) ia[i] = byteStr.charCodeAt(i);
      var blob = new Blob([ab], {type: 'application/pdf'});
      var url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    }
  });
}

// ── Poista projekti ──
function poistaProjekti(id, nimi) {
  if (confirm('Poistetaanko projekti "' + nimi + '"?')) {
    db.collection('projects').doc(id).delete()
      .then(function(){ naytaToast('🗑 Projekti poistettu'); })
      .catch(function(e){ alert('Virhe: ' + e.message); });
  }
}

// ── Lataa projektit ──
db.collection('projects').orderBy('tyomaa').onSnapshot(function(snap) {
  var lista = document.getElementById('projektilista');
  if (snap.empty) {
    lista.innerHTML = '<div class="empty">Ei projekteja vielä.<br>Lisää ensimmäinen projekti!</div>';
    return;
  }

  var html = '';
  snap.forEach(function(doc) {
    var p = doc.data();
    var id = doc.id;

    // Hinnat
    var hinnatHtml = '';
    if (p.tarjousHinnat && p.tarjousHinnat.length > 0) {
      hinnatHtml = '<div class="tarjous-section">';
      hinnatHtml += '<div class="tarjous-title">📋 Tarjoushinnat</div>';
      p.tarjousHinnat.forEach(function(h) {
        hinnatHtml += '<div class="hinta-rivi">';
        hinnatHtml += '<span class="hinta-nimi">' + h.nimi + '</span>';
        hinnatHtml += '<span><span class="hinta-arvo">' + h.hinta.toFixed(2) + ' €</span>';
        hinnatHtml += '<span class="hinta-yksikko">/ ' + (h.yksikko || 'm²') + '</span></span>';
        hinnatHtml += '</div>';
      });
      hinnatHtml += '</div>';
    }

    // PDF-status
    var pdfStatus = p.pdfBase64
      ? '<span class="pdf-status pdf-ok">📄 Tarjous tallennettu</span>'
      : '<span class="pdf-status pdf-none">📎 Ei tarjousta</span>';

    html += '<div class="proj-card">';
    html += '<div class="proj-main">';
    html += '<div class="proj-name">' + (p.tyomaa || '') + '</div>';
    if (p.tilaaja) html += '<div class="proj-sub">' + p.tilaaja + '</div>';
    if (p.tyonro) html += '<div class="proj-sub">Työnro: ' + p.tyonro + '</div>';
    html += pdfStatus;
    html += '</div>';
    if (hinnatHtml) html += hinnatHtml;
    html += '<div class="proj-actions">';
    if (p.pdfBase64) {
      html += '<button class="proj-btn pdf-btn" onclick="avaaPdf(\'' + id + '\')">📄 Avaa PDF</button>';
    }
    html += '<button class="proj-btn pdf-btn" onclick="avaaLataaPdf(\'' + id + '\', \'' + (p.tyomaa||'').replace(/'/g,"\\'") + '\')">📎 ' + (p.pdfBase64 ? 'Vaihda PDF' : 'Lataa PDF') + '</button>';
    html += '<button class="proj-btn del" onclick="poistaProjekti(\'' + id + '\', \'' + (p.tyomaa||'').replace(/'/g,"\\'") + '\')">🗑 Poista</button>';
    html += '</div>';
    html += '</div>';
  });

  lista.innerHTML = html;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#006CB1">
<title>Projektit – BC Floors Oy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
.hdr{background:#006CB1;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e8a020;position:sticky;top:0;z-index:100;}
.hdr img{height:28px;}
.hdr-right{text-align:right;}
.hdr-title{color:white;font-size:12px;font-weight:700;letter-spacing:.5px;}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:1px;}
.content{padding:14px 16px 100px;}
.loading{text-align:center;padding:30px;color:#006CB1;font-weight:600;font-size:14px;}
.proj-card{background:white;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.proj-main{padding:12px 14px;cursor:pointer;}
.proj-name{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:2px;}
.proj-sub{font-size:12px;color:#64748b;}
.proj-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.ptag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#f1f5f9;color:#64748b;}
.proj-actions{display:flex;border-top:1px solid #f1f5f9;}
.proj-btn{flex:1;padding:10px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#006CB1;}
.proj-btn.del{color:#ef4444;}
.proj-btn:not(:last-child){border-right:1px solid #f1f5f9;}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:10px 16px 14px;box-shadow:0 -2px 10px rgba(0,0,0,.06);}
.btn-add{width:100%;padding:14px;border-radius:12px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:white;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;color:#1e293b;}
.sheet-close{float:right;background:#f1f5f9;border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;line-height:28px;text-align:center;}
.ff{margin-bottom:12px;}
.ff label{display:block;font-size:11px;font-weight:700;color:#006CB1;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.ff input,.ff select{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;color:#1e293b;background:white;outline:none;-webkit-appearance:none;}
.ff input:focus,.ff select:focus{border-color:#006CB1;}
.btn-save{width:100%;padding:14px;border-radius:10px;border:none;background:#006CB1;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.links{display:flex;gap:8px;padding:10px 16px;background:white;border-bottom:1px solid #e2e8f0;overflow-x:auto;}
.link-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;font-family:inherit;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;text-decoration:none;white-space:nowrap;}
.link-btn.active{background:#006CB1;color:white;border-color:#006CB1;}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey: "AIzaSyB_SEcmhmzBBldkbh8CQYL7ncQGVyZIDM4",
    authDomain: "bcfloors-a25ea.firebaseapp.com",
    projectId: "bcfloors-a25ea",
    storageBucket: "bcfloors-a25ea.firebasestorage.app",
    messagingSenderId: "160878550016",
    appId: "1:160878550016:web:9d42f64d0d02375a178ce5"
  });
const db = getFirestore(app);

var projects = [];
var editId = null;

// Real-time listener
onSnapshot(collection(db, 'projects'), (snapshot) => {
  projects = [];
  snapshot.forEach((d) => { projects.push({...d.data(), _fbId: d.id}); });
  projects.sort(function(a,b){ return (a.tyomaa||'').localeCompare(b.tyomaa||''); });
  renderProjects();
  document.getElementById('loading').style.display = 'none';
});

function renderProjects() {
  var list = document.getElementById('projList');
  var empty = document.getElementById('emptyMsg');
  if (!projects.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  var html = '';
  projects.forEach(function(p) {
    var tags = '';
    if (p.toimittaja) tags += '<span class="ptag">'+p.toimittaja+'</span>';

    html += '<div class="proj-card">';
    html += '<div class="proj-main">';
    html += '<div class="proj-name">'+(p.tyomaa||'Nimetön kohde')+'</div>';
    html += '<div class="proj-sub">'+(p.tilaaja||'')+(p.tyonro?' · Työ nro: '+p.tyonro:'')+'</div>';
    if (p.osoite) html += '<div class="proj-sub">📍 '+p.osoite+'</div>';
    if (p.yhteys) html += '<div class="proj-sub">Yhteyshenkilö: '+p.yhteys+'</div>';
    if (tags) html += '<div class="proj-tags">'+tags+'</div>';
    html += '</div>';
    html += '<div class="proj-actions">';
    html += '<button class="proj-btn" data-id="'+p._fbId+'" onclick="window.editProject(this.dataset.id)">✏️ Muokkaa</button>';
    html += '<button class="proj-btn del" data-id="'+p._fbId+'" onclick="window.deleteProject(this.dataset.id)">🗑️ Poista</button>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}

window.openAdd = function() {
  editId = null;
  document.getElementById('sheetTitle').textContent = 'Lisää projekti';
  document.getElementById('p-tilaaja').value = '';
  document.getElementById('p-tilaaja-muu').value = '';
  document.getElementById('p-tyomaa').value = '';
  document.getElementById('p-osoite').value = '';
  document.getElementById('p-tyonro').value = '';
  document.getElementById('p-yhteys').value = '';
  document.getElementById('p-toimittaja').value = '';


  document.getElementById('tilaaja-muu-wrap').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
};

window.editProject = function(fbId) {
  var p = projects.find(function(x){ return x._fbId === fbId; });
  if (!p) return;
  editId = fbId;
  document.getElementById('sheetTitle').textContent = 'Muokkaa projektia';
  // Check if tilaaja is in list
  var sel = document.getElementById('p-tilaaja');
  var found = false;
  for (var i=0; i<sel.options.length; i++) {
    if (sel.options[i].value === p.tilaaja || sel.options[i].text === p.tilaaja) {
      sel.value = sel.options[i].value; found = true; break;
    }
  }
  if (!found) {
    sel.value = '__muu__';
    document.getElementById('tilaaja-muu-wrap').style.display = 'block';
    document.getElementById('p-tilaaja-muu').value = p.tilaaja || '';
  } else {
    document.getElementById('tilaaja-muu-wrap').style.display = 'none';
  }
  document.getElementById('p-tyomaa').value = p.tyomaa || '';
  document.getElementById('p-osoite').value = p.osoite || '';
  document.getElementById('p-tyonro').value = p.tyonro || '';
  document.getElementById('p-yhteys').value = p.yhteys || '';
  document.getElementById('p-toimittaja').value = p.toimittaja || '';

  document.getElementById('overlay').classList.add('open');
};

window.deleteProject = function(fbId) {
  if (!confirm('Poistetaanko projekti?')) return;
  deleteDoc(doc(db, 'projects', fbId)).catch(console.error);
};

window.closeSheet = function() {
  document.getElementById('overlay').classList.remove('open');
};

window.saveProject = function() {
  var tilaajaEl = document.getElementById('p-tilaaja').value;
  var tilaaja = tilaajaEl === '__muu__'
    ? document.getElementById('p-tilaaja-muu').value.trim()
    : tilaajaEl;
  var tyomaa = document.getElementById('p-tyomaa').value.trim();
  if (!tyomaa) { alert('Syötä työmaa / kohde!'); return; }
  var p = {
    tilaaja: tilaaja,
    tyomaa: tyomaa,
    osoite: document.getElementById('p-osoite').value.trim(),
    tyonro: document.getElementById('p-tyonro').value.trim(),
    yhteys: document.getElementById('p-yhteys').value.trim(),
    toimittaja: document.getElementById('p-toimittaja').value,

  };
  if (editId) {
    updateDoc(doc(db, 'projects', editId), p).catch(console.error);
  } else {
    addDoc(collection(db, 'projects'), p).catch(console.error);
  }
  window.closeSheet();
};

// Tilaaja dropdown handler
document.getElementById('p-tilaaja').addEventListener('change', function() {
  document.getElementById('tilaaja-muu-wrap').style.display =
    this.value === '__muu__' ? 'block' : 'none';
});

// Close on overlay click
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) window.closeSheet();
});
</script>
</body>
</html>
